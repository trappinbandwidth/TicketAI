server {
    listen 80;
    server_name _;          # catches the Lightsail IP and any domain pointed at it

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Larger body limit for ticket image uploads (default 1MB is too small)
    client_max_body_size 20M;

    # ── Frontend (static files) ──────────────────────────────
    root /srv/cdl-ticket-scanner/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API (FastAPI via uvicorn) ────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeouts — AI scans can take 30–90s on YELLOW/RED tickets
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }

    # ── API docs ─────────────────────────────────────────────
    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }
}
